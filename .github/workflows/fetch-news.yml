name: Fetch News
on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:
permissions:
  contents: write

concurrency:
  group: repo-writes
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: |
          for attempt in 1 2 3; do
            python scripts/fetch_news.py && break
            if [ "$attempt" = "3" ]; then
              exit 1
            fi
            sleep $((attempt * 20))
          done
        env:
          QWEN_API_KEY: ${{ secrets.QWEN_API_KEY }}
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm run build
      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/news.json data/title_translations.json
          if git diff --cached --quiet; then
            echo "无新闻变化"
          else
            git commit -m "auto: update news $(date -u +%Y-%m-%d-%H:%M)"
            git pull --rebase origin main
            git push
          fi
