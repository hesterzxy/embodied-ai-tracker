name: V2 Company Management

on:
  workflow_dispatch:
    inputs:
      action:
        description: Add or remove a company from V2
        required: true
        default: add
        type: choice
        options:
          - add
          - remove
      company_name:
        description: Company name
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: repo-writes
  cancel-in-progress: false

jobs:
  update-v2-company:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Sync latest main
        run: |
          git pull --rebase origin main
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Update V2 matrix
        env:
          AICODEWITH_API_KEY: ${{ secrets.AICODEWITH_API_KEY }}
          OPENAI_BASE_URL: ${{ secrets.OPENAI_BASE_URL }}
          AICODEWITH_BASE_URL: ${{ secrets.AICODEWITH_BASE_URL }}
          AICODEWITH_MODEL: ${{ secrets.AICODEWITH_MODEL }}
          AICODEWITH_SEARCH_MODEL: ${{ secrets.AICODEWITH_SEARCH_MODEL }}
          OPENAI_MODEL: ${{ secrets.OPENAI_MODEL }}
          QWEN_API_KEY: ${{ secrets.QWEN_API_KEY }}
          DASHSCOPE_API_KEY: ${{ secrets.DASHSCOPE_API_KEY }}
          QWEN_KEY: ${{ secrets.QWEN_KEY }}
          ALIYUN_API_KEY: ${{ secrets.ALIYUN_API_KEY }}
          QWEN_MODEL: ${{ secrets.QWEN_MODEL }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
          BRAVE_SEARCH_API_KEY: ${{ secrets.BRAVE_SEARCH_API_KEY }}
          SERPAPI_API_KEY: ${{ secrets.SERPAPI_API_KEY }}
        run: |
          if [ "${{ github.event.inputs.action }}" = "remove" ]; then
            python scripts/v2_company.py --remove "${{ github.event.inputs.company_name }}"
          else
            python scripts/v2_research_news.py --company "${{ github.event.inputs.company_name }}" || echo "V2 research fetch failed; continuing with existing evidence"
            python scripts/v2_company.py --add "${{ github.event.inputs.company_name }}"
          fi
      - name: Commit V2 data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add v2/data/table.json
          if [ -f v2/data/research_news.json ]; then
            git add v2/data/research_news.json
          fi
          if git diff --cached --quiet; then
            echo "No V2 company changes"
          else
            git commit -m "v2: update company ${{ github.event.inputs.company_name }}"
            git pull --rebase origin main
            git push
          fi
