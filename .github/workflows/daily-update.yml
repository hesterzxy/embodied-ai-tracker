name: Daily Data Update

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      mode:
        description: '运行模式'
        required: false
        default: 'default'
        type: choice
        options:
          - default
          - only-pending
          - all

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install anthropic openai
      - name: Run auto-update script
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          MODE="${{ github.event.inputs.mode }}"
          if [ "$MODE" = "only-pending" ]; then
            python scripts/auto_update.py --only-pending
          elif [ "$MODE" = "all" ]; then
            python scripts/auto_update.py --all
          else
            python scripts/auto_update.py
          fi
      - name: Check for changes and commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/table.json data/verification_report.md 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "无数据变化"
          else
            git commit -m "auto: 每日数据更新 $(date -u +%Y-%m-%d)"
            git push
            echo "✓ 已更新"
          fi
